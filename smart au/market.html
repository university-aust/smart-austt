<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المعرض العام | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --cyan-glow: rgba(0, 229, 255, 0.3);
            --red: #ff4d4d; 
            --deep-dark: rgba(9, 10, 15, 0.9);
        }

        body { 
            background: linear-gradient(rgba(10, 10, 15, 0.8), rgba(10, 10, 15, 0.8)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 5%; background: rgba(0,0,0,0.5); 
            border-bottom: 1px solid var(--cyan-glow); backdrop-filter: blur(10px);
        }
        
        .header-nav h1 {
            font-size: 24px;
            background: linear-gradient(to bottom, #fff, var(--cyan-neon));
           -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .btn-back { 
            background: rgba(0, 229, 255, 0.1); border: 1px solid var(--cyan-neon); 
            color: var(--cyan-neon); padding: 10px 20px; border-radius: 12px; 
            cursor: pointer; text-decoration: none; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-back:hover { background: var(--cyan-neon); color: black; box-shadow: 0 0 15px var(--cyan-glow); }

        .search-container { 
            padding: 20px 5%; display: flex; gap: 15px; flex-wrap: wrap; background: rgba(0,0,0,0.2);
        }
        .search-input { 
            flex: 1; min-width: 250px; padding: 12px 20px; border-radius: 15px; 
            border: 1px solid var(--cyan-glow); background: rgba(0, 0, 0, 0.5); 
            color: white; outline: none; transition: 0.3s;
        }

        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 40px 5%; }
        
        .tool-card {
            background: var(--deep-dark); padding: 25px; border-radius: 25px;
            border: 1px solid var(--cyan-glow); position: relative; 
            transition: 0.4s ease; backdrop-filter: blur(15px);
            display: flex; flex-direction: column; min-height: 220px;
        }
        .tool-card:hover { transform: translateY(-8px); border-color: var(--cyan-neon); box-shadow: 0 0 20px var(--cyan-glow); }

        .sos-card { border: 2px solid var(--red) !important; background: rgba(255, 77, 77, 0.1) !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0px rgba(255, 77, 77, 0.2); }
            50% { box-shadow: 0 0 15px rgba(255, 77, 77, 0.5); }
        }

        .category-tag { background: var(--cyan-neon); color: black; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: bold; margin-right: 5px; }
        .lost-bg { background: #f1c40f; color: #000; }
        .found-bg { background: #2ecc71; color: #000; }

        .contact-btn { width: 100%; margin-top: auto; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* أيقونة الحذف الإداري */
        .admin-del-icon {
            position: absolute; top: 15px; left: 15px; color: var(--red);
            cursor: pointer; opacity: 0.6; transition: 0.3s; font-size: 19px; z-index: 10;
        }
        .admin-del-icon:hover { opacity: 1; transform: scale(1.3); color: #fff; }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1>🌐 معرض <span style="color:var(--cyan-neon)">AUST</span> العام</h1>
        <a href="dashboard.html" class="btn-back"><i class="fas fa-home"></i> العودة للرئيسية</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث عن مادة، أداة، مفقودات..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex: 0; min-width: 180px;" onchange="renderMarket()">
            <option value="all">كل الكليات</option>
            <option value="it">هندسة المعلوماتية</option>
            <option value="dent">طب الأسنان</option>
            <option value="pharm">الصيدلة</option>
            <option value="arch">العمارة</option>
            <option value="chemical">الكيمياء</option>
            <option value="petro">البترول</option>
            <option value="trans">الترجمة</option>
            <option value="lost">🔍 المفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // بياناتكِ الإدارية الثابتة
    const ADMIN_NAME = "shahed mamdoh alkhald";
    const ADMIN_ID = "20241600060";
    const ADMIN_PASS = "Shahed_AUST_2026"; // كلمة السر الإدارية

    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterCol = document.getElementById("filterCollege").value;
        
        // جلب وتنظيف بيانات المستخدم الحالي
        const currentUserName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        const currentUserID = (localStorage.getItem("userID") || "").trim();

        // التحقق: هل أنتِ شهد؟
        const isSuperAdmin = (currentUserName === ADMIN_NAME.toLowerCase() && currentUserID === ADMIN_ID);

        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            grid.innerHTML = "";
            if (!data) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">لا توجد منشورات حالياً.. 🕸️</p>`;
                return;
            }

            const marketArray = Object.keys(data).map(key => ({ id: key, ...data[key] }));

            marketArray.filter(item => {
                const itemName = (item.name || "").toLowerCase();
                const itemOwner = (item.owner || "").toLowerCase();
                const matchesSearch = itemName.includes(searchTerm) || itemOwner.includes(searchTerm);
                let matchesCollege = (filterCol === "all" || item.college === filterCol);
                if(filterCol === "lost") matchesCollege = itemName.includes("مفقود");
                return matchesSearch && matchesCollege;
            }).reverse().forEach(item => {
                const isSOS = item.isSOS === true;
                const isOwner = (item.owner.trim().toLowerCase() === currentUserName);

                let statusTag = '';
                if(item.name.includes("مفقود")) statusTag = '<span class="status-badge lost-bg">مفقود</span>';
                if(item.name.includes("موجود")) statusTag = '<span class="status-badge found-bg">موجود</span>';

                grid.innerHTML += `
                    <div class="tool-card ${isSOS ? 'sos-card' : ''}">
                        ${(isSuperAdmin || isOwner) ? `<i class="fas fa-trash-alt admin-del-icon" onclick="handleDelete('${item.id}', ${isSuperAdmin})" title="حذف"></i>` : ''}
                        
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                            <div>
                                <span class="category-tag">${(item.college || 'AUST').toUpperCase()}</span>
                                ${statusTag}
                            </div>
                            ${isSOS ? '<span style="background:var(--red); color:white; padding:4px 8px; border-radius:10px; font-size:10px; font-weight:bold;">SOS 📡</span>' : ''}
                        </div>
                        <div style="color:var(--cyan-neon); font-size:13px; font-weight:bold;">👤 الناشر: ${item.owner}</div>
                        <h3 style="margin:10px 0; font-size: 1.1rem; color: #fff;">${item.name}</h3>
                        <button onclick="goToChat('${item.owner}', '${item.name}')" 
                                class="contact-btn"
                                style="background:${isSOS ? 'var(--red)' : 'var(--cyan-neon)'}; color:${isSOS ? 'white' : 'black'};">
                            ${isSOS ? 'تقديم مساعدة' : 'تواصل الآن'}
                        </button>
                    </div>`;
            });
        });
    }

    function handleDelete(itemId, isGlobalAdmin) {
        if (isGlobalAdmin) {
            // طلب كلمة السر إذا كنتِ تحذفين منشورات الآخرين
            Swal.fire({
                title: 'تأكيد الهوية الإدارية',
                input: 'password',
                inputPlaceholder: 'أدخلي كلمة السر الخاصة بكِ..',
                showCancelButton: true,
                confirmButtonColor: '#ff4d4d',
                confirmButtonText: 'حذف نهائي',
                background: '#0a0a0f',
                color: '#fff'
            }).then((result) => {
                if (result.isConfirmed && result.value === ADMIN_PASS) {
                    database.ref('globalMarket/' + itemId).remove();
                    Swal.fire({ icon: 'success', title: 'تم الحذف', background: '#0a0a0f', color: '#fff' });
                } else if (result.isConfirmed) {
                    Swal.fire({ icon: 'error', title: 'كلمة سر خاطئة!', background: '#0a0a0f', color: '#fff' });
                }
            });
        } else {
            // حذف الطالب لمنشوره الشخصي (بدون كلمة سر إدارية)
            Swal.fire({
                title: 'حذف منشورك؟',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم، احذف',
                background: '#0a0a0f', color: '#fff'
            }).then((res) => {
                if (res.isConfirmed) database.ref('globalMarket/' + itemId).remove();
            });
        }
    }

    function goToChat(owner, itemName) {
        const loggedUser = localStorage.getItem("userName") || "مستخدم";
        if (owner === loggedUser) {
            Swal.fire({ icon: 'info', title: 'تنبيه', text: 'هذا منشوركِ!', background: '#0a0a0f', color: '#fff' });
            return;
        }
        const user1 = loggedUser.replace(/\s/g, '');
        const user2 = owner.replace(/\s/g, '');
        const chatId = [user1, user2].sort().join('_');

        database.ref('chats/' + chatId).limitToLast(1).once('value', (snap) => {
            if (!snap.exists()) {
                database.ref('chats/' + chatId).push({
                    sender: loggedUser,
                    text: `مرحباً، أنا مهتم بـ: ${itemName}`,
                    time: new Date().toLocaleTimeString('ar-EG'),
                    seen: false
                });
            }
            window.location.href = `chat.html?to=${encodeURIComponent(owner)}&item=${encodeURIComponent(itemName)}`;
        });
    }

    window.onload = renderMarket;
</script>
</body>
</html>
