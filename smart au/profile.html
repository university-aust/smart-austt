<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الملف الشخصي | Shahd Al-Khaled</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --gold: #00d4ff; --gold-glow: rgba(0, 212, 255, 0.5);
            --navy-deep: #1e293b; --glass: rgba(10, 15, 30, 0.85); 
        }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(3, 7, 18, 0.6), rgba(3, 7, 18, 0.6)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white;
        }
        .profile-container { width: 100%; max-width: 850px; padding: 20px; }
        .profile-card {
            background: var(--glass); padding: 30px; border-radius: 40px;
            backdrop-filter: blur(25px); border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center;
        }
        .avatar {
            width: 100px; height: 100px; background: linear-gradient(135deg, var(--gold), var(--navy-deep));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 40px; margin: 0 auto 15px; border: 3px solid var(--gold); box-shadow: 0 0 20px var(--gold-glow);
            position: relative;
        }
        /* إشعار الدائرة الحمراء الجديد */
        .unread-badge {
            position: absolute; top: 0; left: 0; background: #ff4d4d; color: white;
            font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: bold;
            box-shadow: 0 0 10px #ff4d4d;
        }
        .stat-box {
            background: rgba(30, 41, 59, 0.7); padding: 15px 20px; border-radius: 20px;
            border: 1px solid var(--gold); display: inline-block; margin: 10px; min-width: 100px;
        }
        .chats-container {
            margin-top: 20px; text-align: right; max-height: 250px; overflow-y: auto;
            padding: 10px; border-radius: 15px; background: rgba(0,0,0,0.2);
        }
        .chat-item-card {
            display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; border-right: 4px solid var(--gold); transition: 0.3s;
        }
        .chat-item-card.has-new { border-right-color: #ff4d4d; background: rgba(255, 77, 77, 0.1); }
        .chat-item-card:hover { background: rgba(255,255,255,0.15); }
        .activity-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.3); padding: 12px 18px; border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--gold);
        }
        .nav-btn {
            background: rgba(10, 15, 30, 0.8); border: 1px solid var(--gold); color: var(--gold);
            padding: 8px 20px; border-radius: 12px; text-decoration: none; font-weight: bold; cursor: pointer;
        }
        .del-btn { background: #ff4d4d; color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; }
        .edit-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="profile-container">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <a href="dashboard.html" class="nav-btn">🔙 عودة</a>
            <span id="welcomeTitle" class="nav-btn" style="border-color: transparent; cursor: default;">ملف المستخدم</span>
        </div>

        <div class="profile-card">
            <div id="avatar" class="avatar">👤</div>
            <h2 id="userNameDisplay">...</h2>
            <p id="userMajorDisplay" style="color: var(--gold); margin-bottom: 5px;"></p>
            <button class="edit-btn" onclick="editMajor()">🛠️ تعديل الاختصاص</button>
            
            <div style="margin-top: 20px;">
                <div class="stat-box">
                    <span id="itemsCount" style="font-size: 1.5rem; font-weight: bold;">0</span><br><small>أدواتي</small>
                </div>
            </div>

            <div style="text-align: right; margin-top: 25px;">
                <h3 style="color: var(--gold);"><i class="fas fa-comments"></i> محادثاتي الأخيرة:</h3>
                <div id="myChatsList" class="chats-container">
                    <p style="text-align:center; opacity:0.5;">جاري تحميل المحادثات من السحابة...</p>
                </div>
            </div>

            <div style="text-align: right; margin-top: 25px;">
                <h3 style="color: var(--gold);"><i class="fas fa-box"></i> أغراضي في المعرض:</h3>
                <div id="myActivityList"></div>
            </div>

            <button onclick="logout()" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; padding:12px; width:100%; border-radius:15px; margin-top:30px; cursor:pointer; font-weight:bold;">تسجيل الخروج</button>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 2. إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279",
        measurementId: "G-HC2TSQ70V2"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function getActiveUser() {
        return localStorage.getItem("userName") || "شهد الخالد";
    }

    window.onload = function() {
        refreshProfile();
    };

    function refreshProfile() {
        const name = getActiveUser();
        const major = localStorage.getItem("userMajor") || "هندسة البرمجيات";
        
        document.getElementById("userNameDisplay").innerText = name;
        document.getElementById("welcomeTitle").innerText = "ملف " + name;
        document.getElementById("userMajorDisplay").innerText = major;
        document.getElementById("avatar").innerText = name.charAt(0).toUpperCase();
        
        renderMyItems(name);
        loadMyChatsFromFirebase(); // تحديث: الجلب الآن من Firebase مباشرة
    }

    async function editMajor() {
        const { value: newMajor } = await Swal.fire({
            title: 'تعديل الاختصاص',
            input: 'text',
            inputValue: localStorage.getItem("userMajor") || "هندسة البرمجيات",
            confirmButtonColor: '#00d4ff',
            showCancelButton: true,
            cancelButtonText: 'إلغاء'
        });

        if (newMajor) {
            localStorage.setItem("userMajor", newMajor);
            refreshProfile();
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'تم التحديث', showConfirmButton: false, timer: 1500 });
        }
    }

    function renderMyItems(currentName) {
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById("myActivityList");
            if (!data) {
                document.getElementById("itemsCount").innerText = "0";
                list.innerHTML = "<p style='text-align:center; opacity:0.5;'>لم تقومي برفع أي أغراض بعد.</p>";
                return;
            }
            const myItemsKeys = Object.keys(data).filter(key => data[key].owner === currentName);
            document.getElementById("itemsCount").innerText = myItemsKeys.length;
            if(myItemsKeys.length === 0) {
                list.innerHTML = "<p style='text-align:center; opacity:0.5;'>لم تقومي برفع أي أغراض بعد.</p>";
                return;
            }
            list.innerHTML = myItemsKeys.map(key => `
                <div class="activity-item">
                    <span>${data[key].isSOS ? '🆘' : '📦'} ${data[key].name}</span>
                    <button class="del-btn" onclick="deleteMyItem('${key}')">حذف</button>
                </div>
            `).join('');
        });
    }

    function deleteMyItem(firebaseKey) {
        Swal.fire({
            title: 'هل أنتِ متأكدة؟',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'نعم، احذف'
        }).then((res) => {
            if (res.isConfirmed) {
                database.ref('globalMarket/' + firebaseKey).remove();
            }
        });
    }

    // الدالة المصلحة لجلب المراسلات وحل مشكلة الرسائل القديمة
    function loadMyChatsFromFirebase() {
        const chatListDiv = document.getElementById("myChatsList");
        const currentUserName = getActiveUser();
        const safeKey = currentUserName.replace(/\s/g, '');

        database.ref('chats').on('value', (snapshot) => {
            const allChats = snapshot.val();
            chatListDiv.innerHTML = "";
            let found = false;

            if (allChats) {
                Object.keys(allChats).forEach(chatId => {
                    if (chatId.includes(safeKey)) {
                        found = true;
                        const messages = allChats[chatId];
                        const msgKeys = Object.keys(messages);
                        const lastMsg = messages[msgKeys[msgKeys.length - 1]];
                        
                        // حساب غير المقروء
                        const unreadCount = msgKeys.filter(k => messages[k].sender !== currentUserName && !messages[k].seen).length;
                        
                        // معرفة الطرف الآخر
                        const parts = chatId.split('_');
                        const otherPerson = parts.find(p => p !== safeKey) || "زميل";

                        chatListDiv.innerHTML += `
                            <div class="chat-item-card ${unreadCount > 0 ? 'has-new' : ''}" 
                                 onclick="window.location.href='chat.html?to=${otherPerson}&item=${lastMsg.item || 'عام'}'">
                                <div class="avatar" style="width:40px; height:40px; font-size:18px; margin:0; position:relative;">
                                    ${otherPerson.charAt(0).toUpperCase()}
                                    ${unreadCount > 0 ? `<div class="unread-badge">${unreadCount}</div>` : ''}
                                </div>
                                <div style="flex:1;">
                                    <div style="font-weight:bold; color:var(--gold); font-size:0.9rem;">${otherPerson}</div>
                                    <div style="font-size:0.75rem; opacity:0.7;">${lastMsg.text.substring(0, 25)}...</div>
                                </div>
                                <div style="font-size:0.6rem; opacity:0.4;">${lastMsg.time}</div>
                            </div>
                        `;
                    }
                });
            }
            if (!found) chatListDiv.innerHTML = "<p style='text-align:center; opacity:0.5;'>لا توجد محادثات نشطة حالياً.</p>";
        });
    }

    function logout() { 
        localStorage.clear(); // تنظيف الذاكرة المحلية فوراً
        window.location.href = "index.html"; 
    }
</script>
</body>
</html>
