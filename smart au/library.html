<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة نبض AUST | Shahd Al-Khaled</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --cyan: #00d4ff;
            --bg-overlay: rgba(2, 6, 23, 0.7);
            --card-bg: rgba(255, 255, 255, 0.08); 
            --text-color: #ffffff;
            --nav-bg: rgba(2, 6, 23, 0.9);
            --theory: #ff9f43;
            --practical: #10ac84;
        }

        body.light-mode {
            --bg-overlay: rgba(241, 245, 249, 0.85);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-color: #1e293b;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-overlay) url('67260.jpg') no-repeat center center fixed;
            background-size: cover; background-blend-mode: overlay;
            color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s;
        }

        .navbar {
            backdrop-filter: blur(20px); background: var(--nav-bg);
            padding: 12px 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--cyan); position: sticky; top: 0; z-index: 1000;
        }

        .nav-controls { display: flex; gap: 15px; align-items: center; }
        
        .btn-nav {
            padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 0.85rem;
        }
        .btn-add { background: var(--cyan); color: #000; }
        .btn-share { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }

        .filter-section {
            padding: 15px 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(10px);
        }

        /* تنسيق شريط البحث الجديد */
        .search-wrapper {
            position: relative;
            grid-column: 1 / -1; /* يأخذ العرض كاملاً في الشبكة */
            margin-bottom: 10px;
        }
        .search-input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border-radius: 15px;
            border: 1px solid rgba(0, 212, 255, 0.4);
            background: rgba(15, 23, 42, 0.8);
            color: white;
            outline: none;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        .search-input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }
        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cyan);
        }

        .m-select {
            padding: 12px; border-radius: 12px; border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(15, 23, 42, 0.6); color: white; outline: none; transition: 0.3s;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 30px 5%; }

        .card {
            background: var(--card-bg); border-radius: 22px; padding: 25px;
            position: relative; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            min-height: 240px; display: flex; flex-direction: column; justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover { 
            transform: translateY(-8px); 
            border-color: var(--cyan);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.25);
        }

        .badge {
            position: absolute; top: 15px; left: 15px;
            padding: 5px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; color: #fff;
        }
        .theory { background: var(--theory); box-shadow: 0 0 10px var(--theory); }
        .practical { background: var(--practical); box-shadow: 0 0 10px var(--practical); }

        .doc-name { font-size: 0.85rem; color: var(--cyan); margin-top: 5px; font-weight: bold; }

        .stats-bar { display: flex; gap: 12px; font-size: 0.75rem; margin-top: 10px; opacity: 0.8; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-card-main { flex: 2; padding: 11px; border-radius: 12px; border: none; background: var(--cyan); color: #000; font-weight: bold; cursor: pointer; }
        .btn-card-dl { flex: 1; padding: 11px; border-radius: 12px; border: 1px solid var(--cyan); color: var(--cyan); text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; }

        .del-icon { position: absolute; top: 15px; right: 15px; color: #ff4d4d; cursor: pointer; display: none; font-size: 1.1rem; }

        .fab-mode {
            position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px;
            border-radius: 50%; background: var(--cyan); border: none; cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @media (max-width: 600px) { .filter-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="appBody">

    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:12px;">
            <a href="dashboard.html" style="color:var(--text-color); font-size:1.3rem;"><i class="fas fa-arrow-right"></i></a>
            <div style="font-size: 1.4rem; font-weight: 900; color: var(--cyan);">NABD AUST</div>
        </div>
        
        <div class="nav-controls">
            <div id="adminPanel" style="display:none; align-items: center; gap: 15px;">
                <a href="requests.html" style="position: relative; color: var(--text-color); font-size: 1.2rem; text-decoration: none;">
                    <i class="fas fa-bell"></i>
                    <span id="reqCount" style="display:none; position: absolute; top: -8px; right: -8px; background: #ff4d4d; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 50%; font-weight: bold;">0</span>
                </a>
                <button onclick="addNewItem()" class="btn-nav btn-add">إضافة</button>
            </div>
            
            <button onclick="studentShare()" class="btn-nav btn-share">شارك ملفك</button>
        </div>
    </nav>

    <div class="filter-section">
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="smartSearch" class="search-input" placeholder="ابحث عن مادة، دكتور، أو موضوع..." onkeyup="runFilter()">
        </div>

        <select id="f_fac" class="m-select" onchange="runFilter()">
            <option value="الكل">جميع الكليات</option>
            <option value="هندسه معلوماتية">هندسه معلوماتية</option>
            <option value="هندسه معماريه">هندسه معماريه</option>
            <option value="هندسه بترول">هندسه بترول</option>
            <option value="هندسه كيميائيه">هندسه كيميائيه</option>
            <option value="طب اسنان">طب اسنان</option>
            <option value="صيدله">صيدله</option>
        </select>
        <select id="f_year" class="m-select" onchange="runFilter()">
            <option value="الكل">جميع السنوات</option>
            <option value="سنة أولى">سنة أولى</option><option value="سنة ثانية">سنة ثانية</option>
            <option value="سنة ثالثة">سنة ثالثة</option><option value="سنة رابعة">سنة رابعة</option>
            <option value="سنة خامسة">سنة خامسة</option>
        </select>
        <select id="f_type" class="m-select" onchange="runFilter()">
            <option value="الكل">نظري + عملي</option>
            <option value="نظري">نظري</option>
            <option value="عملي">عملي</option>
        </select>
    </div>

    <div class="grid" id="mainGrid"></div>

    <button class="fab-mode" onclick="document.getElementById('appBody').classList.toggle('light-mode')"><i class="fas fa-adjust"></i></button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let libraryData = [];

    const admins = [
        { name: "shahed mamdoh alkhald", id: "20241600060", key: "shjkshjk" },
        { name: "Deaa amar malaika", id: "20241600086", key: "shahed2006" }
    ];

    const currentUser = localStorage.getItem("userName");
    const currentID = localStorage.getItem("universityID");
    const currentKey = localStorage.getItem("securityKey");

    function isAuthorized() {
        return admins.some(admin => 
            admin.name === currentUser && 
            admin.id === currentID && 
            admin.key === currentKey
        );
    }

    function startApp() {
        if (isAuthorized()) {
            document.getElementById('adminPanel').style.display = 'flex';
            watchRequests();
        }
        
        db.ref('official_library/').on('value', (snap) => {
            const val = snap.val();
            libraryData = val ? Object.keys(val).map(k => ({...val[k], id: k})) : [];
            runFilter();
        });
    }

    function watchRequests() {
        db.ref('suggestions/').on('value', (snap) => {
            const count = snap.numChildren();
            const badge = document.getElementById('reqCount');
            if (count > 0) {
                badge.innerText = count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        });
    }

    function runFilter() {
        const fac = document.getElementById('f_fac').value;
        const yea = document.getElementById('f_year').value;
        const typ = document.getElementById('f_type').value;
        const query = document.getElementById('smartSearch').value.toLowerCase(); // جلب نص البحث
        const container = document.getElementById('mainGrid');
        container.innerHTML = "";
        
        let list = libraryData;
        if(fac !== 'الكل') list = list.filter(i => i.category === fac);
        if(yea !== 'الكل') list = list.filter(i => i.year === yea);
        if(typ !== 'الكل') list = list.filter(i => i.type === typ);

        // منطق البحث الذكي (يبحث في العنوان واسم الدكتور والكلية)
        if(query !== "") {
            list = list.filter(i => 
                (i.title && i.title.toLowerCase().includes(query)) || 
                (i.doctor && i.doctor.toLowerCase().includes(query)) ||
                (i.category && i.category.toLowerCase().includes(query))
            );
        }

        const hasAdminAccess = isAuthorized();

        list.reverse().forEach(item => {
            const badgeClass = item.type === 'عملي' ? 'practical' : 'theory';
            container.innerHTML += `
                <div class="card">
                    <div class="badge ${badgeClass}">${item.type || 'نظري'}</div>
                    <i class="fas fa-trash del-icon" 
                       style="${hasAdminAccess ? 'display:block' : 'display:none'}" 
                       onclick="deleteItem('${item.id}')"></i>
                    <div>
                        <h3 style="margin:25px 0 5px 0; font-size:1.1rem;">${item.title}</h3>
                        <div class="doc-name">د. ${item.doctor || 'غير محدد'}</div>
                        <div class="stats-bar">
                            <span><i class="fas fa-eye" style="color:var(--cyan)"></i> ${item.views || 0}</span>
                            <span><i class="fas fa-download" style="color:#10ac84"></i> ${item.downloads || 0}</span>
                        </div>
                        <p style="font-size:0.75rem; opacity:0.6; margin-top:12px;">${item.category} | ${item.year}</p>
                    </div>
                    <div class="btn-group">
                        <button class="btn-card-main" onclick="handleView('${item.id}', '${item.url}', '${item.title}')">فتح</button>
                        <a href="${item.url}" target="_blank" class="btn-card-dl" onclick="handleDownload('${item.id}')">
                            <i class="fas fa-download"></i>
                        </a>
                    </div>
                </div>`;
        });
    }

    function handleView(id, url, title) {
        db.ref('official_library/' + id + '/views').transaction(c => (c || 0) + 1);
        viewPdf(url, title);
    }

    function handleDownload(id) {
        db.ref('official_library/' + id + '/downloads').transaction(c => (c || 0) + 1);
    }

    function viewPdf(url, title) {
        Swal.fire({
            title: title,
            html: `<iframe src="https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true" style="width:100%; height:450px; border:none; border-radius:10px;"></iframe>`,
            width: '95%', background: '#0f172a', color: '#fff'
        });
    }

    function addNewItem() {
        if (!isAuthorized()) return;
        Swal.fire({
            title: 'إضافة محاضرة رسمية',
            background: '#0f172a', color: '#fff',
            html: `
                <input id="in-t" class="swal2-input" style="color:white" placeholder="اسم المادة">
                <input id="in-d" class="swal2-input" style="color:white" placeholder="اسم الدكتور">
                <input id="in-u" class="swal2-input" style="color:white" placeholder="رابط الملف">
                <select id="in-c" class="swal2-input" style="color:black">
                    <option value="هندسه معلوماتية">هندسه معلوماتية</option>
                    <option value="هندسه معماريه">هندسه معماريه</option>
                    <option value="هندسه بترول">هندسه بترول</option>
                    <option value="هندسه كيميائيه">هندسه كيميائيه</option>
                    <option value="طب اسنان">طب اسنان</option>
                    <option value="صيدله">صيدله</option>
                </select>
                <select id="in-y" class="swal2-input" style="color:black">
                    <option value="سنة أولى">سنة أولى</option><option value="سنة ثانية">سنة ثانية</option>
                    <option value="سنة ثالثة">سنة ثالثة</option><option value="سنة رابعة">سنة رابعة</option>
                    <option value="سنة خامسة">سنة خامسة</option>
                </select>
                <select id="in-tp" class="swal2-input" style="color:black">
                    <option value="نظري">نظري</option><option value="عملي">عملي</option>
                </select>`,
            preConfirm: () => ({
                title: document.getElementById('in-t').value,
                doctor: document.getElementById('in-d').value,
                url: document.getElementById('in-u').value,
                category: document.getElementById('in-c').value,
                year: document.getElementById('in-y').value,
                type: document.getElementById('in-tp').value,
                views: 0, downloads: 0
            })
        }).then(r => { if(r.isConfirmed) db.ref('official_library/').push(r.value); });
    }

    function studentShare() {
        Swal.fire({
            title: 'مساهمة الطلاب',
            text: 'أدخل رابط الملف لمراجعته من قبل الإدارة',
            input: 'url', inputPlaceholder: 'رابط الملف هنا',
            showCancelButton: true, confirmButtonText: 'إرسال'
        }).then(r => {
            if(r.isConfirmed && r.value) {
                db.ref('suggestions/').push({ url: r.value, sender: currentUser || 'مجهول' });
                Swal.fire('تم الإرسال', 'شكراً لمساهمتك! سيتم مراجعته قريباً.', 'success');
            }
        });
    }

    function deleteItem(id) {
        if (!isAuthorized()) return;
        Swal.fire({ title: 'حذف نهائي؟', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ff4d4d' }).then(r => {
            if(r.isConfirmed) db.ref('official_library/'+id).remove();
        });
    }

    window.onload = startApp;
</script>
</body>
</html>
